name: Fetch site tracker signals

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run fetch script
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node fetch-signals.mjs

      - name: Upload unresolved-item audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failures-${{ github.run_id }}
          path: failures.json
          if-no-files-found: warn
          retention-days: 30

      - name: Merge and push seen.json
        run: |
          set -e
          git config user.name "site-tracker-bot"
          git config user.email "actions@github.com"

          # seen.json is never git-merged. Each attempt fetches the true latest seen.json
          # from origin, unions it with this run's new-guids.json at the JSON level (via
          # merge-seen.mjs), and tries a plain push. If the push is rejected because another
          # run landed in the meantime, we just repeat with the newly-fetched state — this
          # makes a text-level merge conflict on seen.json structurally impossible, since git
          # is never asked to reconcile two diverging copies of the file.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main

            node merge-seen.mjs
            git add seen.json

            if git diff --staged --quiet; then
              echo "No new seen items to commit."
              break
            fi

            git commit -m "Update seen items [skip ci]"

            if git push origin HEAD:main; then
              echo "Pushed seen.json update on attempt $attempt."
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "Failed to push seen.json after 5 attempts." >&2
              exit 1
            fi
            echo "Push rejected (concurrent run) — retrying (attempt $attempt/5)..."
            sleep $(( (RANDOM % 5) + 1 ))
          done
